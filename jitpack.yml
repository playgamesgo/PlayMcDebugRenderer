jdk:
  - openjdk25

before_install:
  - source "$HOME/.sdkman/bin/sdkman-init.sh"
  - sdk update
  - sdk install java 25.0.1-open
  - sdk use java 25.0.1-open

build:
  commands:
    - ./gradlew :common:publishToMavenLocal :minestom:publishToMavenLocal :fabric:publishToMavenLocal
  artifacts:
    - common/build/libs
    - minestom/build/libs
    - fabric/build/libs